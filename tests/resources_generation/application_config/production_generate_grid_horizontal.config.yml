---
applications:
- application: simtools-production-generate-grid
  configuration:
    array_layout_name: LSTN-01
    axis:
    - azimuth 310 deg 20 deg 3 linear
    - zenith 30 deg 40 deg 2 linear
    - offset 0 deg 10 deg 2 linear
    core_scatter: 10 500 m
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 30 GeV 300 GeV
    corsika_limits: tests/resources/generated/corsika_simulation_limits/corsika_limits_north.ecsv
    model_version: 7.0.0
    showers_per_run: 5
    number_of_runs: 2
    output_file: production_grid_points_horizontal.ecsv
    output_path: ./tmp-test-resources/production_generate_grid_horizontal
    primary: gamma
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 10 deg
collection:
  output_path: tests/resources/generated/
  files:
  - production_grid_points_horizontal.ecsv
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
runtime_environment:
  image: ghcr.io/gammasim/simtools-prod:v0.28.0-v78010-v2025-11-30-rc-generic
  network: simtools-mongo-network
  environment_file: ./.env
  container_engine: podman
  options:
  - '--arch amd64'
