---
applications:
- application: simtools-generate-array-config
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    model_version: 5.0.0
    output_path: ./tmp-test-resources/generate_array_config_alpha_north_5.0.0
    site: North
    label: test
collection:
  output_path: tests/resources/generated/sim_telarray_configurations/5.0.0/
  files:
  - CTA-alpha-North_test.cfg
  - CTA-North-LSTN-01_test.cfg
  - CTA-North-LSTN-02_test.cfg
  - CTA-North-MSTN-01_test.cfg
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
runtime_environment:
  image: ghcr.io/gammasim/simtools-prod:v0.28.0-v78010-v2025-11-30-rc-generic
  network: simtools-mongo-network
  environment_file: ./.env
  container_engine: podman
  options:
  - '--arch amd64'
