---
applications:
- application: simtools-simulate-prod
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": subsystem_lsts
        ">=7.0.0": CTAO-South-LSTs
    azimuth_angle: South
    core_scatter: 1 840 m
    corsika_seeds: [534, 220, 1104, 382]
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 10 GeV 11 GeV
    label: test
    log_level: DEBUG
    model_version: 6.0.2
    showers_per_run: 10
    output_path: simtools-output
    primary: gamma
    run_number: 7
    sim_telarray_seed: [1745, 290]
    simulation_software: corsika
    site: South
    zenith_angle: 40
collection:
  output_path: tests/resources/
  files:
  - gamma_run000007_za40deg_azm180deg_South_subsystem_lsts_6.0.2_test.corsika.zst
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
runtime_environment:
  image: ghcr.io/gammasim/simtools-prod:v0.28.0-v78010-v2025-11-30-rc-generic
  network: simtools-mongo-network
  environment_file: ./.env
  container_engine: podman
  options:
  - '--arch amd64'
