---
applications:
- application: simtools-simulate-prod
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    azimuth_angle: South
    core_scatter: 5 500 m
    corsika_seeds: [534, 220, 1104, 382]
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 200 GeV 500 GeV
    label: test
    log_level: DEBUG
    model_version: 6.0.2
    showers_per_run: 5
    output_path: ./tmp-test-resources/simulate_prod_proton_20deg_north_alpha
    pack_for_grid_register: ./tmp-test-resources/grid-output
    primary: proton
    run_number: 1
    save_reduced_event_lists: true
    sim_telarray_seed: [1745, 290]
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 5 deg
    zenith_angle: 20
collection:
  source_directory:
  - output_path
  - pack_for_grid_register
  output_path: tests/resources/generated/
  files:
  - proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.log_hist.tar.gz
  - proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.simtel.zst
  - proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.reduced_event_data.hdf5
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
runtime_environment:
  image: ghcr.io/gammasim/simtools-prod:v0.28.0-v78010-v2025-11-30-rc-generic
  network: simtools-mongo-network
  environment_file: ./.env
  container_engine: podman
  options:
  - '--arch amd64'
