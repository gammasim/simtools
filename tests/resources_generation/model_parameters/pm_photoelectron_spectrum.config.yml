---
applications:
- application: simtools-db-get-parameter-from-db
  configuration:
    export_model_file: true
    output_path: ./tmp-test-resources/
    parameter: pm_photoelectron_spectrum
    parameter_version: 2.0.0
    site: North
    telescope: LSTN-design
collection:
  output_path: tests/resources
  files:
  - spe_LST_2022-04-27_AP2.0e-4.dat
schema_name: application_workflow.metaschema
schema_url: https://github.com/gammasim/simtools/blob/main/src/simtools/schemas/application_workflow.metaschema.yml
schema_version: 0.4.0
runtime_environment:
  image: ghcr.io/gammasim/simtools-prod:v0.28.0-v78010-v2025-11-30-rc-generic
  network: simtools-mongo-network
  environment_file: ./.env
  container_engine: podman
  options:
  - '--arch amd64'
