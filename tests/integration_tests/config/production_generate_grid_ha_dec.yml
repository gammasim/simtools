---
applications:
- application: simtools-production-generate-grid
  configuration:
    array_layout_name: LSTN-01
    axis:
    - ha 0 deg 360 deg 36 linear
    - dec -90 deg 90 deg 18 linear
    - offset 0 deg 10 deg 2 linear
    core_scatter: 10 500 m
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 30 GeV 300 GeV
    corsika_limits: ${downloaded:corsika_limits.ecsv}
    model_version: 6.0.2
    showers_per_run: 5
    showers_per_run_power_law: 0.0 1 TeV
    number_of_runs: 2
    output_file: job_grid_ha_dec.ecsv
    output_path: simtools-output
    primary: gamma
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 10 deg
  integration_tests:
  - output_file: job_grid_ha_dec.ecsv
  skip_integration_test: Requires model DB access for site-location lookup in ha_dec mode.
  test_name: production_generate_grid_ha_dec
schema_name: application_workflow.metaschema
schema_version: 0.4.0
