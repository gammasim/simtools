---
applications:
- application: simtools-production-estimate-trigger-statistics
  configuration:
    input: simtools-output/trigger_histograms.hdf5
    optimization_energy_max: 10 TeV
    optimization_energy_min: 0.1 TeV
    output_file: trigger_histograms_estimate.ecsv
    output_path: simtools-output
    target_relative_uncertainty: 0.1
  integration_tests:
  - output_file: trigger_histograms_estimate.ecsv
  test_name: production_estimate_trigger_statistics
  xfail: "Requires generated trigger histogram fixture to be produced before enabling."
schema_name: application_workflow.metaschema
schema_version: 0.4.0
