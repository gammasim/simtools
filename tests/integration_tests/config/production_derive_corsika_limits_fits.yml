---
applications:
- application: simtools-production-derive-corsika-limits
  configuration:
    event_data_file: tests/resources/static/proton_za20deg_azm000deg_North_alpha_6.0.0_reduced_event_data.fits.gz
    allowed_losses:
    - core_distance,0.001,10
    - angular_distance,0.001,10
    energy_threshold_fraction: 0.0001
    output_file: corsika_simulation_limits.ecsv
    output_path: simtools-output
    plot_histograms: false
    telescope_ids: tests/resources/static/production_layouts_telescope_ids.yml
  integration_tests:
  - output_file: corsika_simulation_limits.ecsv
  - output_file: corsika_simulation_limits.meta.yml
  test_name: fits
  xfail: "Deprecated fits input (issue #2265)"
schema_name: application_workflow.metaschema
schema_version: 0.4.0
