---
applications:
- application: simtools-production-derive-statistics
  configuration:
    azimuths:
    - 180
    base_path: tests/resources/static/production_dl2_fits/
    file_name_template: prod6_LaPalma-{zenith}deg_gamma_cone.N.Am-4LSTs09MSTs_ID0_reduced.fits.gz
    grid_points_production_file: tests/resources/generated/production_grid_points_horizontal.ecsv
    metrics_file: tests/resources/static/production_simulation_config_metrics.yml
    nsb:
    - 1
    off_axis_angles:
    - 0
    output_file: interpolated_production_statistics.ecsv
    output_path: simtools-output
    zeniths:
    - 20
    - 40
  integration_tests:
  - output_file: interpolated_production_statistics.ecsv
  test_name: production_derive_statistics
  xfail: "TODO application requires outdated production grid file (issue #2270)"
schema_name: application_workflow.metaschema
schema_version: 0.4.0
