      path_descriptor: output_path
    - file: sim_telarray/illuminator_North_ILLN-01_7.0.0_simulate_illuminator_MSTN-06.simtel.zst
      path_descriptor: output_path
    - file: sim_telarray/illuminator_North_ILLN-01_7.0.0_simulate_illuminator_MSTN-07.simtel.zst
      path_descriptor: output_path
    - file: sim_telarray/illuminator_North_ILLN-01_7.0.0_simulate_illuminator_MSTN-10.simtel.zst
