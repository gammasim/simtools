      path_descriptor: output_path
    - file: sim_telarray/illuminator_North_ILLN-01_7.0.0_simulate_illuminator_MSTN-06_300nm.simtel.zst
      path_descriptor: output_path
    - file: sim_telarray/illuminator_North_ILLN-01_7.0.0_simulate_illuminator_MSTN-07_300nm.simtel.zst
      path_descriptor: output_path
