---
applications:
- application: simtools-production-generate-grid
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    azimuth_angle:
    - North
    - South
    core_scatter: 10 500 m
    corsika_he_interaction:
    - epos
    - qgs3
    corsika_le_interaction: urqmd
    energy_range:
    - 30 GeV 30 GeV
    - 300 GeV 300 GeV
    label: test-production-grid
    log_level: DEBUG
    model_version:
    - 6.3.0
    - 7.0.0
    nshow: 5
    number_of_runs: 2
    output_file: job_grid_example.ecsv
    output_path: simtools-output
    primary:
    - gamma
    - proton
    run_number: 10
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 10 deg
    zenith_angle:
    - 20
    - 40
  integration_tests:
  - output_file: job_grid_example.ecsv
  test_name: production_generate_grid_explicit
schema_name: application_workflow.metaschema
schema_version: 0.4.0
