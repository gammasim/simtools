---
applications:
- application: simtools-production-generate-grid
  docs:
    title: Explicit definition of all grid parameters.
    summary: Includes number of events scaled by energy and zenith.
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    azimuth_angle:
    - North
    - South
    core_scatter: 10 500 m
    corsika_he_interaction:
    - epos
    - qgs3
    corsika_le_interaction: urqmd
    energy_range:
    - 30 GeV 30 GeV
    - 300 GeV 300 GeV
    label: test-production-grid
    log_level: DEBUG
    model_version:
    - 6.3.0
    - 7.0.0
    showers_per_run: 5
    showers_per_run_power_law: 0.0 1 TeV
    total_showers: 50
    total_showers_scaling: zenith_scaled
    output_file: job_grid_horizontal_explicit.ecsv
    output_path: simtools-output
    primary:
    - gamma
    - proton
    run_number: 10
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 10 deg
    zenith_angle:
    - 20
    - 40
  integration_tests:
  - output_file: job_grid_horizontal_explicit.ecsv
    output_validation:
    - name: job_grid_content
      kind: table
      path_descriptor: output_path
      file: job_grid_horizontal_explicit.ecsv
      format: ecsv
      non_empty: true
      count:
        minimum: 1
      columns:
        run_number:
          finite: true
          unique: true
        primary:
          allowed_values: [gamma, proton]
        azimuth_angle:
          finite: true
          allowed_values: [0.0, 180.0]
        zenith_angle:
          finite: true
          range:
            minimum: 20.0
            maximum: 40.0
            unit: deg
        energy_min:
          finite: true
          range:
            minimum: 30.0
            maximum: 300.0
            unit: GeV
        energy_max:
          finite: true
          range:
            minimum: 30.0
            maximum: 300.0
            unit: GeV
        cores_per_shower:
          finite: true
        core_scatter_max:
          finite: true
          range:
            minimum: 0.0
            maximum: 500.0
            unit: m
        view_cone_min:
          finite: true
          range:
            minimum: 0.0
            maximum: 10.0
            unit: deg
        view_cone_max:
          finite: true
          range:
            minimum: 0.0
            maximum: 10.0
            unit: deg
        showers_per_run:
          finite: true
          range:
            minimum: 1.0
        nsb_rate:
          finite: true
        model_version:
          allowed_values: ["6.3.0", "7.0.0"]
        corsika_le_interaction:
          allowed_values: [urqmd]
        corsika_he_interaction:
          allowed_values: [epos, qgs3]
      metadata:
        required_keys:
        - job_grid_summary
        - job_grid_format_version
      consistency:
      - left:
          source: metadata
          path: job_grid_summary.simulation_rows
        operator: equals
        right:
          source: content
          metric: row_count
      - left:
          source: metadata
          path: job_grid_summary.total_showers
        operator: equals
        right:
          source: content
          aggregate:
            function: sum
            column: showers_per_run
      - left:
          source: content
          aggregate:
            function: sum
            column: showers_per_run
        operator: greater_than
        right: 0
      data_product_schema: src/simtools/schemas/job_grid_density.schema.yml
  test_name: production_generate_grid_horizontal_explicit
schema_name: application_workflow.metaschema
schema_version: 0.4.0
