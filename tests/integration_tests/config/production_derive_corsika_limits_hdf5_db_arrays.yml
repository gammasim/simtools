---
applications:
- application: simtools-production-derive-corsika-limits
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0":
        - 1lst
        - alpha
        ">=7.0.0":
        - LSTN-01
        - CTAO-North-Alpha
    event_data_file: tests/resources/proton_za20deg_azm000deg_North_alpha_6.0.0_*.hdf5
    loss_fraction: 0.001
    model_version: 6.0.2
    output_file: corsika_simulation_limits.ecsv
    output_path: simtools-output
    plot_histograms: true
    site: North
    differential_loss_per_energy_bin: true
    differential_loss_bins_per_decade: 5
  integration_tests:
  - output_file: corsika_simulation_limits.ecsv
  - output_file: corsika_simulation_limits.meta.yml
  test_name: hdf5_arrays_from_db
schema_name: application_workflow.metaschema
schema_version: 0.4.0
