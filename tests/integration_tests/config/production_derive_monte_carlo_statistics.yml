---
applications:
- application: simtools-production-derive-monte-carlo-statistics
  configuration:
    trigger_histogram_file: ./tests/resources/generated/trigger_histograms.hdf5
    optimization_energy_max: 100 TeV
    optimization_energy_min: 0.1 TeV
    reduced_core_radius: 200 m
    spectral_index: -1.5
    output_file: trigger_histograms_estimate.ecsv
    output_path: simtools-output
    target_relative_uncertainty: 0.1
    plot_diagnostics: true
  integration_tests:
  - output_file: trigger_histograms_estimate.ecsv
  test_name: production_derive_monte_carlo_statistics
  xfail: "Requires generated trigger histogram fixture to be produced before enabling."
schema_name: application_workflow.metaschema
schema_version: 0.4.0
