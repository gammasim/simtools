---
applications:
- application: simtools-simulate-prod
  docs:
    title: Run a small proton production (North).
    summary: Reduced-runtime example for Alpha array layout.
  configuration:
    array_layout_name:
      by_version:
        "<7.0.0": alpha
        ">=7.0.0": CTAO-North-Alpha
    azimuth_angle: South
    core_scatter: 5 500 m
    corsika_seeds: [534, 220, 1104, 382]
    corsika_he_interaction: epos
    corsika_le_interaction: urqmd
    energy_range: 200 GeV 500 GeV
    label: test
    log_level: DEBUG
    model_version: 6.0.2
    showers_per_run: 5
    output_path: simtools-output
    grid_output_path: simtools-grid-output
    primary: proton
    run_number: 1
    sim_telarray_seed: [1745, 290]
    simulation_software: corsika_sim_telarray
    site: North
    view_cone: 0 deg 5 deg
    zenith_angle: 20
  integration_tests:
  - test_simtel_cfg_files:
      "5.0.0": ${generated:sim_telarray_configurations/5.0.0/CTAO-LSTN-01.cfg}
      "6.0.2": ${generated:sim_telarray_configurations/6.0.2/CTAO-LSTN-01.cfg}
  - test_simtel_cfg_files:
      "5.0.0": ${generated:sim_telarray_configurations/5.0.0/CTAO-LSTN-02.cfg}
      "6.0.2": ${generated:sim_telarray_configurations/6.0.2/CTAO-LSTN-02.cfg}
  - test_simtel_cfg_files:
      "5.0.0": ${generated:sim_telarray_configurations/5.0.0/CTAO-MSTN-01.cfg}
      "6.0.2": ${generated:sim_telarray_configurations/6.0.2/CTAO-MSTN-01.cfg}
  - test_simtel_cfg_files:
      "5.0.0": ${generated:sim_telarray_configurations/5.0.0/CTAO-North-alpha.cfg}
      "6.0.2": ${generated:sim_telarray_configurations/6.0.2/CTAO-North-alpha.cfg}
  - test_output_files:
    - file: proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.simtel.log.gz
      path_descriptor: grid_output_path
    - file: proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.hdata.zst
      path_descriptor: grid_output_path
    - expected_sim_telarray_output:
        pe_sum:
        - 20
        - 1000
        photons:
        - 90
        - 1000
        trigger_time:
        - 0
        - 50
      file: proton_run000001_za20deg_azm180deg_North_alpha_6.0.2_test.simtel.zst
      path_descriptor: grid_output_path
  test_name: proton_20_deg_north_check_output
schema_name: application_workflow.metaschema
schema_version: 0.4.0
