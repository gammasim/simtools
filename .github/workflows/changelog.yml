---
name: Changelog
# Require a changelog entry for each pull request
# from: https://github.com/cta-observatory/ctapipe/blob/main/.github/workflows/changelog.yml

on:
  workflow_dispatch:
  pull_request:
    types: [opened, labeled, unlabeled, ready_for_review]
    branches:
      - 'main'

env:
  FRAGMENT_NAME_PREFIX: "docs/changes/${{ github.event.number }}"

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate changelog fragments
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-changelog-needed') && !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        shell: bash
        run: |
          set -euo pipefail

          valid_pattern="^${FRAGMENT_NAME_PREFIX}\.(feature|bugfix|api|maintenance|doc|model)\.md$"

          # Collect changelog files and ignore housekeeping file.
          files=$(find docs/changes -maxdepth 1 -type f ! -name ".gitkeep" | sort || true)

          # Ensure there is at least one valid fragment for this PR.
          if ! echo "${files}" | grep -Pq "${valid_pattern}"; then
            echo "ERROR: No valid changelog fragment found."
            echo "Expected: ${FRAGMENT_NAME_PREFIX}.(feature|bugfix|api|maintenance|doc|model).md"
            exit 1
          fi

          # Fail if any file in docs/changes does not match the expected naming.
          invalid_files=$(echo "${files}" | grep -Pv "${valid_pattern}" || true)
          if [ -n "${invalid_files}" ]; then
            echo "ERROR: Invalid changelog fragment filename(s) found:"
            echo "${invalid_files}"
            echo "Expected: ${FRAGMENT_NAME_PREFIX}.(feature|bugfix|api|maintenance|doc|model).md"
            exit 1
          fi
