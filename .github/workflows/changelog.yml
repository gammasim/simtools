---
name: Changelog
# Require a changelog entry for each pull request
# from: https://github.com/cta-observatory/ctapipe/blob/main/.github/workflows/changelog.yml

on:
  workflow_dispatch:
  pull_request:
    types: [opened, labeled, unlabeled, ready_for_review]
    branches:
      - 'main'

env:
  FRAGMENT_NAME_PREFIX: "docs/changes/${{ github.event.number }}"

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate changelog fragments
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-changelog-needed') && !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        shell: bash
        run: |
          set -euo pipefail

          current_pr_pattern="^${FRAGMENT_NAME_PREFIX}\.(feature|bugfix|api|maintenance|doc|model)\.md$"
          any_pr_pattern="^docs/changes/[0-9]+\.(feature|bugfix|api|maintenance|doc|model)\.md$"

          files=$(find docs/changes -maxdepth 1 -type f -name "*.md" ! -name ".gitkeep" | sort || true)

          # Ensure there is a valid fragment for the current PR number.
          if ! echo "${files}" | grep -Pq "${current_pr_pattern}"; then
            echo "ERROR: No valid changelog fragment found."
            echo "Expected: ${FRAGMENT_NAME_PREFIX}.(feature|bugfix|api|maintenance|doc|model).md"
            exit 1
          fi

          # Reject any numbered changelog fragment that does not use the current PR number.
          wrong_pr_files=$(echo "${files}" | grep -P "${any_pr_pattern}" | grep -Pv "${current_pr_pattern}" || true)
          if [ -n "${wrong_pr_files}" ]; then
            echo "ERROR: Changelog fragment(s) found for a different PR number:"
            echo "${wrong_pr_files}"
            echo "Expected current PR prefix: ${FRAGMENT_NAME_PREFIX}.(feature|bugfix|api|maintenance|doc|model).md"
            exit 1
          fi
