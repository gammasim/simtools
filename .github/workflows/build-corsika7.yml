---
name: build-corsika7
# Build and push CORSIKA7 images for different CPU architectures.
# The generic (non-optimized) images are built as multi-platform images (x86_64 and arm64).
#
# The images are built and pushed when manually triggered (workflow_dispatch).
#

on:
  workflow_dispatch:
  pull_request:
    paths:
      - docker/Dockerfile-corsika7
      - pyproject.toml
      - src/simtools/applications/dependency_versions.py
      - src/simtools/schemas/dependency_versions.schema.yml
      - docker/validate_corsika7_build.sh
      - .github/workflows/build-corsika7.yml
  schedule:
    - cron: '0 0 1 * *'  # Every 1st day of the month at 00:00 UTC (build only)

permissions: {}

env:
  REGISTRY: ghcr.io
  CLOUD_URL: "https://syncandshare.desy.de/index.php/s/"

jobs:
  dependency-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_image: ${{ steps.config.outputs.base_image }}
      build_base_image: ${{ steps.config.outputs.build_base_image }}
      autoconf_version: ${{ steps.config.outputs.autoconf_version }}
      autoconf_sha256: ${{ steps.config.outputs.autoconf_sha256 }}
      corsika_matrix: ${{ steps.config.outputs.corsika_matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: config
        run: |
          python -m pip install packaging
          python src/simtools/applications/dependency_versions.py --format github-output >> "$GITHUB_OUTPUT"

  download-auxiliary-files:
    runs-on: ubuntu-latest
    needs: dependency-config

    steps:
      - name: download-auxiliary-files
        env:
          CLOUD_AUTOCONF: ${{ secrets.CLOUD_AUTOCONF }}
          AUTOCONF_VERSION: ${{ needs.dependency-config.outputs.autoconf_version }}
          AUTOCONF_SHA256: ${{ needs.dependency-config.outputs.autoconf_sha256 }}
        run: |
          if curl -L --fail \
            --retry 5 --retry-delay 10 --retry-connrefused \
            --connect-timeout 30 \
            "https://ftp.gnu.org/gnu/autoconf/autoconf-${AUTOCONF_VERSION}.tar.gz" \
            -o autoconf.tar.gz && \
            echo "${AUTOCONF_SHA256}  autoconf.tar.gz" | sha256sum --check --strict; then
            echo "Downloaded autoconf from GNU."
          else
            echo "GNU download failed; trying the DESY cloud backup."
            curl -L --fail \
              --retry 5 --retry-delay 10 --retry-connrefused \
              --connect-timeout 30 \
              "${{ env.CLOUD_URL }}/${CLOUD_AUTOCONF}/download" \
              -o autoconf.tar.gz
            echo "${AUTOCONF_SHA256}  autoconf.tar.gz" | sha256sum --check --strict
          fi
      - name: upload-auxiliary-files
        uses: actions/upload-artifact@v7
        with:
          name: upload-auxiliary-files
          path: |
            autoconf.tar.gz
          retention-days: 1

  build-corsika7:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [dependency-config, download-auxiliary-files]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJSON(needs.dependency-config.outputs.corsika_matrix) }}
    env:
      BASE_LABEL: "corsika7"
      BASE_TAG: "v${{ matrix.corsika }}-${{ matrix.avx_flag }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download auxiliary files
        uses: actions/download-artifact@v8
        with:
          name: upload-auxiliary-files
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=raw,value=${{ env.BASE_TAG }}
            type=ref,event=pr,suffix=-${{ env.BASE_TAG }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}-${{ env.BASE_TAG }}
            type=schedule,pattern={{date 'YYYYMMDD'}}-${{ env.BASE_TAG }}
          images: ${{ env.REGISTRY }}/gammasim/${{ env.BASE_LABEL }}
          flavor: latest=false

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          # Build multi-platform only for generic (non-optimized) variant, others are x86-specific
          platforms: ${{ matrix.avx_flag == 'generic' && 'linux/amd64,linux/arm64/v8' || 'linux/amd64' }}
          build-args: |
            BASE_IMAGE=${{ needs.dependency-config.outputs.base_image }}
            BUILD_BASE_IMAGE=${{ needs.dependency-config.outputs.build_base_image }}
            AVX_FLAG=${{ matrix.avx_flag }}
            CORSIKA_VERSION=${{ matrix.corsika }}
            CORSIKA_SOURCE_REF=${{ matrix.corsika_source_ref }}
            CORSIKA_SOURCE_URL=${{ matrix.corsika_source_url }}
            CORSIKA_CONFIG_VERSION=${{ matrix.corsika_config }}
            CORSIKA_CONFIG_SOURCE_URL=${{ matrix.corsika_config_source_url }}
            CORSIKA_CONFIG_REVISION=${{ matrix.corsika_config_revision }}
            CORSIKA_OPT_PATCH_VERSION=${{ matrix.corsika_opt_patch }}
            CORSIKA_OPT_PATCH_SOURCE_URL=${{ matrix.corsika_opt_patch_source_url }}
            CORSIKA_OPT_PATCH_REVISION=${{ matrix.corsika_opt_patch_revision }}
            AUTOCONF_VERSION=${{ needs.dependency-config.outputs.autoconf_version }}
            AUTOCONF_SHA256=${{ needs.dependency-config.outputs.autoconf_sha256 }}
          secrets: |
            corsika7_token=${{ secrets.CORSIKA7_KIT_GITLAB }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          file: ./docker/Dockerfile-corsika7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
