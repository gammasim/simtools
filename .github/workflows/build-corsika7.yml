---
name: build-corsika7
# Build and push CORSIKA7 images for different CPU architectures.
# The generic (non-optimized) images are built as multi-platform images (x86_64 and arm64).
#
# The images are built and pushed when manually triggered (workflow_dispatch).
#

on:
  workflow_dispatch:
  pull_request:
    paths:
      - docker/Dockerfile-corsika7
      - docker/validate_corsika7_build.sh
      - .github/workflows/build-corsika7.yml
  schedule:
    - cron: '0 0 1 * *'  # Every 1st day of the month at 00:00 UTC (build only)

permissions: {}

env:
  REGISTRY: ghcr.io
  AUTOCONF_URL: "https://ftp.gnu.org/gnu/autoconf/autoconf-2.71.tar.gz"
  AUTOCONF_SHA256: "431075ad0bf529ef13cb41e9042c542381103e80015686222b8a9d4abef42a1c"
  CLOUD_URL: "https://syncandshare.desy.de/index.php/s/"

jobs:
  download-auxiliary-files:
    runs-on: ubuntu-latest

    steps:
      - name: download-auxiliary-files
        run: |
          if curl -L --fail \
            --retry 5 --retry-delay 10 --retry-connrefused \
            --connect-timeout 30 \
            "${{ env.AUTOCONF_URL }}" \
            -o autoconf.tar.gz && \
            echo "${{ env.AUTOCONF_SHA256 }}  autoconf.tar.gz" | sha256sum --check --strict; then
            echo "Downloaded autoconf from GNU."
          else
            echo "GNU download failed; trying the DESY cloud backup."
            curl -L --fail \
              --retry 5 --retry-delay 10 --retry-connrefused \
              --connect-timeout 30 \
              "${{ env.CLOUD_URL }}/${{ secrets.CLOUD_AUTOCONF }}/download" \
              -o autoconf.tar.gz
            echo "${{ env.AUTOCONF_SHA256 }}  autoconf.tar.gz" | sha256sum --check --strict
          fi
      - name: upload-auxiliary-files
        uses: actions/upload-artifact@v7
        with:
          name: upload-auxiliary-files
          path: |
            autoconf.tar.gz
          retention-days: 1

  build-corsika7:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: [download-auxiliary-files]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        corsika: ['78010', '78050']
        avx_flag: ['generic', 'avx2', 'avx512f', 'sse4']
        include:
          - corsika: '78010'
            corsika_config: 'v1.0.0'
            corsika_opt_patch: 'v1.2.0'
          - corsika: '78050'
            corsika_config: 'v1.0.0'
            corsika_opt_patch: 'v1.2.0'
    env:
      BASE_LABEL: "corsika7"
      BASE_TAG: "v${{ matrix.corsika }}-${{ matrix.avx_flag }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download auxiliary files
        uses: actions/download-artifact@v8
        with:
          name: upload-auxiliary-files
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=raw,value=${{ env.BASE_TAG }}
            type=ref,event=pr,suffix=-${{ env.BASE_TAG }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}-${{ env.BASE_TAG }}
            type=schedule,pattern={{date 'YYYYMMDD'}}-${{ env.BASE_TAG }}
          images: ${{ env.REGISTRY }}/gammasim/${{ env.BASE_LABEL }}
          flavor: latest=false

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          # Build multi-platform only for generic (non-optimized) variant, others are x86-specific
          platforms: ${{ matrix.avx_flag == 'generic' && 'linux/amd64,linux/arm64/v8' || 'linux/amd64' }}
          build-args: |
            AVX_FLAG=${{ matrix.avx_flag }}
            CORSIKA_VERSION=${{ matrix.corsika }}
            CORSIKA_CONFIG_VERSION=${{ matrix.corsika_config }}
            CORSIKA_OPT_PATCH_VERSION=${{ matrix.corsika_opt_patch }}
          secrets: |
            corsika7_token=${{ secrets.CORSIKA7_KIT_GITLAB }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          file: ./docker/Dockerfile-corsika7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
