---
name: CI-integrationtests

permissions: {}

on:
  workflow_dispatch:
    inputs:
      simulation_model_branch:
        description: 'Simulation model branch'
        required: false
        type: string
        default: 'main'
  workflow_call:
    inputs:
      container_image:
        description: 'Container image to use for tests'
        required: false
        type: string
        default: 'ghcr.io/gammasim/simtools-dev:latest'
      model_versions:
        description: 'Model versions to test'
        required: false
        type: string
        default: '["7.0.0","6.0.2","5.0.0","6.0.2,6.1.1"]'
    secrets:
      DB_SERVER:
        required: false
      DB_API_USER:
        required: false
      DB_API_PW:
        required: false
      DB_API_PORT:
        required: false
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - 'docs/**'
      - 'tests/unit_tests/**'
  schedule:
    - cron: "0 0 * * *"
  release:
    types: [published]

jobs:

  test_building:
    if: ${{ github.event_name != 'workflow_call' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

  prepare_interaction_tables:
    name: download CORSIKA interaction tables
    runs-on: ubuntu-latest
    env:
      IT_NAME: "corsika7-interaction-tables"
      CORSIKA_TABLES: "v0.1.0"

    steps:
      - name: Restore cached CORSIKA interaction tables
        id: restore_interaction_tables
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.IT_NAME }}
          key: corsika-interaction-tables-${{ env.CORSIKA_TABLES }}-${{ github.run_id }}
          restore-keys: |
            corsika-interaction-tables-${{ env.CORSIKA_TABLES }}-

      - name: Clone CORSIKA interaction tables (exclude QGSJet tables)
        run: |
          REPO_URL=https://gitlab.cta-observatory.org/cta-computing/dpps/simpipe/simulation_software/${IT_NAME}
          export GIT_LFS_SKIP_SMUDGE=1  # disable automatic downloading of all LFS files

          CLONE_DIR="${IT_NAME}-clone"
          CACHE_DIR="$IT_NAME"
          rm -rf "$CLONE_DIR"

          for attempt in 1 2 3; do
            if timeout 180 git clone --depth 1 --branch "$CORSIKA_TABLES" "$REPO_URL" "$CLONE_DIR"; then
              git lfs install
              (cd "$CLONE_DIR" && git lfs pull --exclude="interaction-tables/qgsdat-II-04,interaction-tables/qgsdat-III")
              rm -rf "$CACHE_DIR"
              mv "$CLONE_DIR" "$CACHE_DIR"
              echo "Successfully cloned CORSIKA interaction tables $CORSIKA_TABLES."
              exit 0
            fi

            rm -rf "$CLONE_DIR"
            if [[ "$attempt" -lt 3 ]]; then
              echo "Clone attempt $attempt failed. Retrying in 120 seconds..."
              sleep 120
            fi
          done

          if [[ -d "$CACHE_DIR" ]]; then
            echo "GitLab clone failed; using cached CORSIKA interaction tables $CORSIKA_TABLES."
            exit 0
          fi

          echo "Failed to clone CORSIKA interaction tables $CORSIKA_TABLES and no cache is available."
          exit 1

      - name: Save cached CORSIKA interaction tables
        if: steps.restore_interaction_tables.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.IT_NAME }}
          key: corsika-interaction-tables-${{ env.CORSIKA_TABLES }}-${{ github.run_id }}

      - name: Upload CORSIKA interaction tables
        uses: actions/upload-artifact@v7
        with:
          name: corsika-interaction-tables
          path: ${{ env.IT_NAME }}
          if-no-files-found: error
          retention-days: 30

  prepare_simulation_models:
    name: download simulation models
    runs-on: ubuntu-latest
    env:
      SIM_MODELS_REPO: "https://gitlab.cta-observatory.org/cta-science/simulations/simulation-model/simulation-models.git"

    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@v6

      - name: Determine simulation model branch
        id: simulation_model_branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BRANCH: ${{ github.event.inputs.simulation_model_branch }}
        run: |
          set -a
          source .env_template
          set +a

          BRANCH="main"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_BRANCH" ]; then
            BRANCH="$INPUT_BRANCH"
          fi
          CURRENT_REF="$REF_NAME"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CURRENT_REF="$HEAD_REF"
          fi
          if [[ "$CURRENT_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]*$ ]]; then
            echo "Detected RC version branch: $CURRENT_REF - setting branch to $SIMTOOLS_DB_SIMULATION_MODEL_VERSION"
            BRANCH="$SIMTOOLS_DB_SIMULATION_MODEL_VERSION"
          fi
          echo "SIMTOOLS_DB_SIMULATION_MODEL_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Restore cached simulation models repository
        if: github.event_name != 'schedule'
        id: restore_simulation_models
        uses: actions/cache/restore@v5
        with:
          path: simulation-models
          key: simulation-models-${{ steps.simulation_model_branch.outputs.branch }}-${{ github.run_id }}
          restore-keys: |
            simulation-models-${{ steps.simulation_model_branch.outputs.branch }}-

      - name: Clone simulation models repository
        if: github.event_name != 'schedule'
        run: |
          CLONE_DIR="simulation-models-clone"
          CACHE_DIR="simulation-models"
          rm -rf "$CLONE_DIR"
          CLONE_SUCCESS=false

          for attempt in 1 2 3; do
            if timeout 180 git clone --depth 1 --branch "$SIMTOOLS_DB_SIMULATION_MODEL_BRANCH" "$SIM_MODELS_REPO" "$CLONE_DIR"; then
              rm -rf "$CACHE_DIR"
              mv "$CLONE_DIR" "$CACHE_DIR"
              echo "Successfully cloned simulation models branch $SIMTOOLS_DB_SIMULATION_MODEL_BRANCH."
              CLONE_SUCCESS=true
              break
            fi

            rm -rf "$CLONE_DIR"
            if [[ "$attempt" -lt 3 ]]; then
              echo "Clone attempt $attempt failed. Retrying in 120 seconds..."
              sleep 120
            fi
          done

          if [ "$CLONE_SUCCESS" = false ] && [ ! -d "$CACHE_DIR" ]; then
            echo "GitLab clone failed; using cached simulation models branch $SIMTOOLS_DB_SIMULATION_MODEL_BRANCH."
            exit 1
          fi


      - name: Save cached simulation models repository
        if: github.event_name != 'schedule' && steps.restore_simulation_models.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: simulation-models
          key: simulation-models-${{ steps.simulation_model_branch.outputs.branch }}-${{ github.run_id }}

      - name: Upload simulation models repository
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v7
        with:
          name: simulation-models-repo
          path: simulation-models
          if-no-files-found: error
          retention-days: 30

  integration_tests:
    needs: [prepare_interaction_tables, prepare_simulation_models]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ${{ inputs.container_image || 'ghcr.io/gammasim/simtools-dev:latest' }}
      options: --user 0
    env:
      CONTAINER_IMAGE: ${{ inputs.container_image || 'ghcr.io/gammasim/simtools-dev:latest' }}
      IT_NAME: "corsika7-interaction-tables"

    services:
      mongodb:
        image: mongo:latest
        env:
          MONGO_INITDB_ROOT_USERNAME: api
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --host localhost --port 27017 -u api -p password --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        model_version: ${{ fromJSON(inputs.model_versions || '["7.0.0","6.0.2","5.0.0","6.0.2,6.1.1"]') }}

    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create runtime environment (.env)
        run: |
          set -a
          source .env_template
          set +a

          DB_SERVER="mongodb"
          DB_API_USER="api"
          DB_API_PW="password"
          DB_API_PORT="27017"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DB_SERVER="${{ secrets.DB_SERVER }}"
            DB_API_USER="${{ secrets.DB_API_USER }}"
            DB_API_PW="${{ secrets.DB_API_PW }}"
            DB_API_PORT="${{ secrets.DB_API_PORT }}"
          fi

          SIMTOOLS_DB_SIMULATION_MODEL="${SIMTOOLS_DB_SIMULATION_MODEL//\'/}"
          {
            echo "SIMTOOLS_DB_SERVER=$DB_SERVER"
            echo "SIMTOOLS_DB_API_USER=$DB_API_USER"
            echo "SIMTOOLS_DB_API_PW=$DB_API_PW"
            echo "SIMTOOLS_DB_API_PORT=$DB_API_PORT"
            echo "SIMTOOLS_DB_SIMULATION_MODEL=$SIMTOOLS_DB_SIMULATION_MODEL"
            echo "SIMTOOLS_DB_SIMULATION_MODEL_VERSION=$SIMTOOLS_DB_SIMULATION_MODEL_VERSION"
            echo "SIMTOOLS_SIM_TELARRAY_PATH=$SIMTOOLS_SIM_TELARRAY_PATH"
            echo "SIMTOOLS_CORSIKA_PATH=$SIMTOOLS_CORSIKA_PATH"
            echo "SIMTOOLS_CORSIKA_INTERACTION_TABLE_PATH=$SIMTOOLS_CORSIKA_INTERACTION_TABLE_PATH"
          } | tee .env >> "$GITHUB_ENV"

      - name: Download CORSIKA interaction tables
        uses: actions/download-artifact@v8
        with:
          name: corsika-interaction-tables
          path: ${{ env.SIMTOOLS_CORSIKA_INTERACTION_TABLE_PATH }}/..

      - name: Download simulation models repository
        if: github.event_name != 'schedule'
        uses: actions/download-artifact@v8
        with:
          name: simulation-models-repo
          path: ../simulation-models

      - name: Extend PATH (sim_telarray)
        run: |
          [ -n "$SIMTOOLS_SIM_TELARRAY_PATH" ] && echo "$SIMTOOLS_SIM_TELARRAY_PATH" >> "$GITHUB_PATH"

      - name: Install Python dependencies (prod container)
        if: contains(inputs.container_image, 'simtools-prod')
        run: |
          pip install --no-cache-dir pytest pytest-cov pytest-requirements pytest-xdist pytest-retry

      - name: Install Python dependencies (dev container)
        if: ${{ !contains(inputs.container_image, 'simtools-prod') }}
        run: |
          pip install --no-cache-dir -e '.[tests,dev,doc]'

      - name: Upload data to MongoDB
        if: github.event_name != 'schedule'
        run: |
          simtools-db-upload-model-repository \
            --db_simulation_model ${{ env.SIMTOOLS_DB_SIMULATION_MODEL }} \
            --db_simulation_model_version ${{ env.SIMTOOLS_DB_SIMULATION_MODEL_VERSION }} \
            --repository_dir ../simulation-models

      - name: Integration tests
        shell: bash -l {0}
        run: |
          cat .env
          pytest --model_version=${{ matrix.model_version }} --color=yes --durations=20 \
            -n 4 --dist loadscope --retries 2 --retry-delay 5 --no-cov tests/integration_tests/
