---
name: build-simtel_array
# Build and push sim_telarray images.
#
# The images are built and pushed when manually triggered (workflow_dispatch).
#

on:
  workflow_dispatch:
  pull_request:
    paths:
      - docker/Dockerfile-simtel_array
      - pyproject.toml
      - src/simtools/dependency_versions.py
      - src/simtools/schemas/dependency_versions.schema.yml
  schedule:
    - cron: '0 0 1 * *'  # Every 1st day of the month at 00:00 UTC (build only)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLOUD_URL: "https://syncandshare.desy.de/index.php/s/"

permissions:
  contents: read

jobs:
  dependency-config:
    runs-on: ubuntu-latest
    outputs:
      base_image: ${{ steps.config.outputs.base_image }}
      build_base_image: ${{ steps.config.outputs.build_base_image }}
      gsl_version: ${{ steps.config.outputs.gsl_version }}
      gsl_sha256: ${{ steps.config.outputs.gsl_sha256 }}
      simtel_matrix: ${{ steps.config.outputs.simtel_matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: config
        run: python src/simtools/dependency_versions.py --format github-output >> "$GITHUB_OUTPUT"

  download-auxiliary-files:
    runs-on: ubuntu-latest

    steps:
      - name: download-auxiliary-files
        run: |
          curl -L --fail \
            --retry 5 --retry-delay 10 --retry-connrefused \
            --connect-timeout 30 \
           "${{ env.CLOUD_URL }}/${{ secrets.CLOUD_GSL }}/download" \
           -o gsl.tar.gz
      - name: upload-auxiliary-files
        uses: actions/upload-artifact@v7
        with:
          name: upload-auxiliary-files
          path: |
            gsl.tar.gz
          retention-days: 1

  build-sim_telarray:
    runs-on: ubuntu-latest
    needs: [dependency-config, download-auxiliary-files]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJSON(needs.dependency-config.outputs.simtel_matrix) }}
    env:
      BASE_LABEL: "sim_telarray"
      BASE_TAG: "${{ matrix.simtel_version }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download auxiliary files
        uses: actions/download-artifact@v8
        with:
          name: upload-auxiliary-files
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=raw,value=${{ env.BASE_TAG }}
            type=ref,event=pr,suffix=-${{ env.BASE_TAG }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}-${{ env.BASE_TAG }}
            type=schedule,pattern={{date 'YYYYMMDD'}}-${{ env.BASE_TAG }}
          images: ${{ env.REGISTRY }}/gammasim/${{ env.BASE_LABEL }}
          flavor: latest=true

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: 'linux/amd64,linux/arm64/v8'
          build-args: |
            BASE_IMAGE=${{ needs.dependency-config.outputs.base_image }}
            BUILD_BASE_IMAGE=${{ needs.dependency-config.outputs.build_base_image }}
            SIMTEL_VERSION=${{ matrix.simtel_version }}
            SIMTEL_SOURCE_URL=${{ matrix.simtel_source_url }}
            SIMTEL_REVISION=${{ matrix.simtel_revision }}
            HESSIO_VERSION=${{ matrix.hessio_version }}
            HESSIO_SOURCE_URL=${{ matrix.hessio_source_url }}
            HESSIO_REVISION=${{ matrix.hessio_revision }}
            STDTOOLS_VERSION=${{ matrix.stdtools_version }}
            STDTOOLS_SOURCE_URL=${{ matrix.stdtools_source_url }}
            STDTOOLS_REVISION=${{ matrix.stdtools_revision }}
            GSL_VERSION=${{ needs.dependency-config.outputs.gsl_version }}
            GSL_SHA256=${{ needs.dependency-config.outputs.gsl_sha256 }}
          secrets: |
            sim_telarray_token=${{ secrets.SIMTELARRAY_CTAO_GITLAB }}
            hessio_token=${{ secrets.HESSIO_CTAO_GITLAB }}
            stdtools_token=${{ secrets.STDTOOLS_CTAO_GITLAB }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          file: ./docker/Dockerfile-simtel_array
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
