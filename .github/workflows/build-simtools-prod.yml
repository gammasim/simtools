---
name: build-simtools-prod
# Build simtools images for production based on CORSIKA / sim_telarray images.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-rc*'
  pull_request:
    paths:
      - docker/Dockerfile-simtools-prod
      - pyproject.toml
      - src/simtools/applications/dependency_versions.py
      - src/simtools/applications/dependency_manifest.py
      - src/simtools/dependencies.py
      - src/simtools/schemas/dependency_manifest.schema.yml
      - src/simtools/schemas/dependency_versions.schema.yml
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC (build only)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions: {}

jobs:
  dependency-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_image: ${{ steps.config.outputs.base_image }}
      python_version: ${{ steps.config.outputs.python_version }}
      apptainer_version: ${{ steps.config.outputs.apptainer_version }}
      production_matrix: ${{ steps.config.outputs.production_matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: config
        run: |
          python -m pip install packaging
          python src/simtools/applications/dependency_versions.py --format github-output >> "$GITHUB_OUTPUT"

  build-simtools-prod:
    runs-on: ubuntu-latest
    needs: dependency-config
    permissions:
      contents: read
      packages: write
    outputs:
      generic_tag: ${{ steps.export-tags.outputs.generic_tag }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.dependency-config.outputs.production_matrix) }}
    env:
      BASE_LABEL: "simtools-prod"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set build identity
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "SIMTOOLS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "SIMTOOLS_VERSION=0.0.0+g${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          fi
          echo "SIMTOOLS_GIT_REVISION=$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/gammasim/${{ env.BASE_LABEL }}
          flavor: |
            latest=false
            suffix=-${{ matrix.corsika }}-${{ matrix.sim_telarray }}-${{ matrix.avx_flag }}
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Export generic tag for testing
        id: export-tags
        if: matrix.avx_flag == 'generic'
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          TAG=${TAG##*:}
          echo "generic_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Exported generic tag: $TAG"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.avx_flag == 'generic' && 'linux/amd64,linux/arm64/v8' || 'linux/amd64' }}
          build-args: |
            BASE_IMAGE=${{ needs.dependency-config.outputs.base_image }}
            CORSIKA_IMAGE=${{ matrix.corsika_image }}
            SIMTEL_IMAGE=${{ matrix.simtel_image }}
            AVX_FLAG=${{ matrix.avx_flag }}
            PYTHON_VERSION=${{ needs.dependency-config.outputs.python_version }}
            SIMTOOLS_VERSION=${{ env.SIMTOOLS_VERSION }}
            SIMTOOLS_GIT_REVISION=${{ env.SIMTOOLS_GIT_REVISION }}
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
          file: ./docker/Dockerfile-simtools-prod
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Apptainer
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
        env:
          APPTAINER_VERSION: v${{ needs.dependency-config.outputs.apptainer_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f /tmp/apptainer.deb
          gh release download "${APPTAINER_VERSION}" --repo apptainer/apptainer --pattern "apptainer_${APPTAINER_VERSION#v}_amd64.deb" -O /tmp/apptainer.deb
          sudo apt-get update -yq
          sudo apt-get install --yes --quiet /tmp/apptainer.deb
          apptainer --version

      - name: Generate and push Apptainer images
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
        env:
          APPTAINER_DOCKER_USERNAME: ${{ github.actor }}
          APPTAINER_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          trap 'apptainer registry logout oras://ghcr.io' EXIT
          printf '%s' "${APPTAINER_DOCKER_PASSWORD}" | apptainer registry login -u "${APPTAINER_DOCKER_USERNAME}" --password-stdin oras://ghcr.io
          while IFS= read -r image_tag; do
            if [[ -z "${image_tag}" ]]; then
              continue
            fi

            tag_name="${image_tag##*:}"
            if [[ "${tag_name}" == *-generic ]]; then
              tag_name="${tag_name%-generic}-generic-amd64"
            fi
            apptainer_tag="${tag_name}-apptainer"
            sif_file="${tag_name}.sif"
            oci_manifest_digest=$(docker run --rm "${image_tag}" python -c \
              'from simtools.dependencies import get_dependency_manifest_digest; print(get_dependency_manifest_digest())')
            oci_manifest_checksum=$(docker run --rm "${image_tag}" \
              cat /opt/simtools/provenance/dependency-manifest.json.sha256)
            image_repository="${image_tag%:*}"
            docker buildx imagetools create \
              --annotation "index:org.gammasim.simtools.dependency-manifest-sha256=sha256:${oci_manifest_digest}" \
              --tag "${image_tag}" \
              "${image_repository}@${{ steps.build.outputs.digest }}"
            oci_digest=$(docker buildx imagetools inspect "${image_tag}" | \
              awk '$1 == "Digest:" {print $2; exit}')
            apptainer build "${sif_file}" "docker://${image_tag}" || { echo "Failed to build Apptainer image for ${image_tag}" >&2; exit 1; }
            manifest_digest=$(apptainer exec "${sif_file}" python -c \
              'from simtools.dependencies import get_dependency_manifest_digest; print(get_dependency_manifest_digest())')
            manifest_checksum=$(apptainer exec "${sif_file}" \
              cat /opt/simtools/provenance/dependency-manifest.json.sha256)
            test "${manifest_digest}" = "${oci_manifest_digest}"
            test "${manifest_checksum}" = "${oci_manifest_checksum}"
            sif_digest=$(sha256sum "${sif_file}" | cut -d ' ' -f1)
            jq -cn \
              --arg release_version "${SIMTOOLS_VERSION}" \
              --arg git_revision "${SIMTOOLS_GIT_REVISION}" \
              --arg image "${image_tag}" \
              --arg oci_digest "${oci_digest}" \
              --arg sif_digest "sha256:${sif_digest}" \
              --arg manifest_digest "sha256:${manifest_digest}" \
              '{release_version: $release_version, git_revision: $git_revision, image: $image, oci_digest: $oci_digest, sif_digest: $sif_digest, dependency_manifest_digest: $manifest_digest}' \
              >> container-provenance.ndjson
            apptainer push -U "${sif_file}" "oras://${image_tag%:*}:${apptainer_tag}" || { echo "Failed to push Apptainer image for ${image_tag}" >&2; exit 1; }
            rm -f "${sif_file}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Upload container provenance
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
        uses: actions/upload-artifact@v7
        with:
          name: container-provenance-${{ matrix.corsika }}-${{ matrix.avx_flag }}
          path: container-provenance.ndjson

  test-simtools-prod:
    permissions:
      contents: read
    needs: build-simtools-prod
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
    uses: ./.github/workflows/CI-integrationtests.yml
    secrets: inherit
    with:
      container_image: ghcr.io/gammasim/simtools-prod:${{ needs.build-simtools-prod.outputs.generic_tag }}
      model_versions: '["7.0.0","6.0.2"]'
