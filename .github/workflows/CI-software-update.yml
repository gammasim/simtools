---
name: Software updates
# Run regularly to update software dependencies

on:
  # Run on the first day of each month at midnight
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pre-commit-auto-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install packages (as pre-commit is running on all files after autoupdate)
        run: |
          pip install -e '.[tests,dev,doc]'
          pip install pylint

      - uses: browniebroke/pre-commit-autoupdate-action@main

      - uses: peter-evans/create-pull-request@v8
        if: always()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/software-dependencies
          title: Update software dependencies
          commit-message: "chore: update software dependencies"
          body: Update pre-commit hooks to current compatible versions.
