---
name: build-simtools-dev
# Build simtools images for developers based on CORSIKA / sim_telarray images (no optimizations).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-rc*'
  pull_request:
    paths:
      - docker/Dockerfile-simtools-dev
      - pyproject.toml
      - src/simtools/dependency_versions.py
      - src/simtools/schemas/dependency_versions.schema.yml
      - tools/generate_development_manifest.py
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC (build only)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLOUD_URL: "https://syncandshare.desy.de/index.php/s/"

permissions: {}

jobs:
  dependency-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_image: ${{ steps.config.outputs.base_image }}
      python_version: ${{ steps.config.outputs.python_version }}
      dev_corsika_image: ${{ steps.config.outputs.dev_corsika_image }}
      dev_simtel_image: ${{ steps.config.outputs.dev_simtel_image }}
    steps:
      - uses: actions/checkout@v7
      - id: config
        run: python src/simtools/dependency_versions.py --format github-output >> "$GITHUB_OUTPUT"

  build-simtools-dev:
    runs-on: ubuntu-latest
    needs: dependency-config
    permissions:
      contents: read
      packages: write
    env:
      BASE_LABEL: "simtools-dev"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set build identity
        run: |
          echo "SIMTOOLS_GIT_REVISION=$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
          images: ${{ env.REGISTRY }}/gammasim/${{ env.BASE_LABEL }}
          flavor: |
            latest=${{ !(startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            BASE_IMAGE=${{ needs.dependency-config.outputs.base_image }}
            CORSIKA_IMAGE=${{ needs.dependency-config.outputs.dev_corsika_image }}
            SIMTEL_IMAGE=${{ needs.dependency-config.outputs.dev_simtel_image }}
            PYTHON_VERSION=${{ needs.dependency-config.outputs.python_version }}
            SIMTOOLS_GIT_REVISION=${{ env.SIMTOOLS_GIT_REVISION }}
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')) }}
          file: ./docker/Dockerfile-simtools-dev
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
