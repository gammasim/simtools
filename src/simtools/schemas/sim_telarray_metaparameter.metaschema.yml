---
$schema: http://json-schema.org/draft-06/schema#
$ref: '#/definitions/SimTelarrayMetaparameterRegistrySource'
title: sim_telarray Metaparameter Registry Metaschema
description: |
  YAML representation of the sim_telarray metaparameter registry metaschema.
schema_version: 0.1.0
schema_name: sim_telarray_metaparameter.metaschema
type: object
additionalProperties: false

definitions:
  SimTelarrayMetaparameterRegistrySource:
    type: object
    additionalProperties: false
    properties:
      title:
        type: string
      schema_version:
        $ref: 'common_definitions.schema.yml#/$defs/schema_version_field'
      meta_schema:
        type: string
      meta_schema_url:
        $ref: 'common_definitions.schema.yml#/$defs/schema_url_field'
      meta_schema_version:
        $ref: 'common_definitions.schema.yml#/$defs/schema_version_field'
      name:
        type: string
      description:
        type: string
      generated_metaparameters:
        type: object
        description: Writer-generated sim_telarray metadata fields keyed by emitted name.
        additionalProperties:
          $ref: '#/definitions/GeneratedSimTelarrayMetaparameterDefinition'
    required:
      - schema_version
      - meta_schema
      - meta_schema_version
      - name
      - generated_metaparameters

  GeneratedSimTelarrayMetaparameterDefinition:
    type: object
    additionalProperties: false
    properties:
      scope:
        type: string
        enum:
          - telescope
          - global
      mode:
        type: string
        enum:
          - add
          - set
          - assign
      category:
        type: string
        enum:
          - simulation_model
          - software
          - run_parameter
          - site_configuration
          - array_configuration
          - provenance
          - environment
      description:
        type: string
      value_schema:
        $ref: '#/definitions/ValueSchema'
    required:
      - scope
      - mode
      - category
      - description

  ValueSchema:
    type: object
    additionalProperties: false
    properties:
      kind:
        type: string
        enum:
          - scalar
          - file_name
          - fixed_numeric_tuple
          - sim_telarray_key_value_string
      data_type:
        type: string
        enum:
          - string
          - number
          - integer
          - boolean
      item_type:
        type: string
        enum:
          - string
          - number
          - integer
      length:
        type: integer
        minimum: 1
      regex:
        type: string
      allow_empty:
        type: boolean
      allow_none_literal:
        type: boolean
    required:
      - kind

  ComparisonPolicy:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - exact
          - numeric_tolerance
          - unordered_set
          - ignore
      absolute_tolerance:
        type: number
        minimum: 0.0
      relative_tolerance:
        type: number
        minimum: 0.0
    required:
      - mode
