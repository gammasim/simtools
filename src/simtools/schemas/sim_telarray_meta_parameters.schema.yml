%YAML 1.2
---
title: Schema for sim_telarray meta_parameter registry
schema_version: 0.1.0
meta_schema: simpipe-schema
meta_schema_url: https://raw.githubusercontent.com/gammasim/simtools/main/src/simtools/schemas/sim_telarray_meta_parameter.metaschema.yml
meta_schema_version: 0.1.0
name: sim_telarray_meta_parameters
description: |-
  Registry of sim_telarray metadata keys emitted by simtools.
  Generated metadata are described explicitly here.
  Model-parameter-derived metadata are resolved automatically from the
  sim_telarray mapping declared in the model-parameter schemas.
generated_meta_parameters:
  array_config_name:
    source_type: generated
    unit: null
    scope: global
    mode: assign
    description: Array configuration name.
    value_schema: &string_scalar {kind: scalar, data_type: string}
    validation: &generated_assign_validation {source_must_exist: false, mapping_must_match: false, config_value_required: true, emitted_value_must_match: true}
  array_config_variant:
    source_type: generated
    unit: null
    scope: global
    mode: assign
    description: Array configuration variant.
    value_schema: {kind: scalar, data_type: string, allow_empty: true}
    validation: *generated_assign_validation
  array_config_version:
    source_type: generated
    unit: null
    scope: global
    mode: assign
    description: Array configuration version.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  camera_config_name:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Camera configuration name.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  camera_config_variant:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Camera configuration variant.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  camera_config_version:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Camera configuration version.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  config_release:
    source_type: generated
    unit: null
    scope: global
    mode: assign
    description: Configuration release string.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  config_version:
    source_type: generated
    unit: null
    scope: global
    mode: assign
    description: Configuration version.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  nsb_integrated_flux:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Integrated night-sky background flux.
    value_schema: {kind: scalar, data_type: number}
    validation: &generated_set_validation {source_must_exist: false, mapping_must_match: false, config_value_required: true, emitted_value_must_match: true}
  primary:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Primary particle type for the simulation run.
    value_schema: *string_scalar
    validation: *generated_set_validation
  azimuth_angle:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Azimuth angle for the simulation run.
    value_schema: {kind: scalar, data_type: number}
    validation: *generated_set_validation
  zenith_angle:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Zenith angle for the simulation run.
    value_schema: {kind: scalar, data_type: number}
    validation: *generated_set_validation
  ha_angle:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Hour angle for the simulation run.
    value_schema: {kind: scalar, data_type: number}
    validation: *generated_set_validation
  dec_angle:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: Declination angle for the simulation run.
    value_schema: {kind: scalar, data_type: number}
    validation: *generated_set_validation
  optics_config_name:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Optics configuration name.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  optics_config_variant:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Optics configuration variant.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  optics_config_version:
    source_type: generated
    unit: null
    scope: telescope
    mode: assign
    description: Optics configuration version.
    value_schema: *string_scalar
    validation: *generated_assign_validation
  random_seed:
    source_type: generated
    unit: null
    scope: global
    mode: add
    description: Random seed included in sim_telarray metadata.
    value_schema: {kind: scalar, data_type: integer}
    validation: &generated_add_validation {source_must_exist: false, mapping_must_match: false, config_value_required: false, emitted_value_must_match: false}
  simtools_avx_flag:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: simtools build AVX flag.
    value_schema: *string_scalar
    validation: *generated_set_validation
  simtools_build_date:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: simtools build date.
    value_schema: *string_scalar
    validation: *generated_set_validation
  simtools_corsika_config_version:
    source_type: generated
    unit: null
    scope: global
    mode: set
    description: simtools CORSIKA configuration version.
    value_schema: *string_scalar
    validation: *generated_set_validation
  simtools_corsika_exec:
