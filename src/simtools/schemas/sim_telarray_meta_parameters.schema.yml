%YAML 1.2
---
title: Schema for sim_telarray meta_parameter registry
schema_version: 0.1.0
meta_schema: simpipe-schema
meta_schema_url: https://raw.githubusercontent.com/gammasim/simtools/main/src/simtools/schemas/sim_telarray_meta_parameter.metaschema.yml
meta_schema_version: 0.1.0
name: sim_telarray_meta_parameters
description: |-
  Registry of sim_telarray metadata keys emitted by simtools.
  Generated metadata are described explicitly here.
  Model-parameter-derived metadata are resolved automatically from the
  sim_telarray mapping declared in the model-parameter schemas.
generated_meta_parameters:
  array_config_name:
    scope: global
    mode: assign
    value_schema: &string_scalar {kind: scalar, data_type: string}
  array_config_variant:
    scope: global
    mode: assign
    value_schema: {kind: scalar, data_type: string, allow_empty: true}
  array_config_version:
    scope: global
    mode: assign
    value_schema: *string_scalar
  camera_config_name:
    scope: telescope
    mode: assign
    value_schema: *string_scalar
  camera_config_variant:
