%YAML 1.2
---
title: Schema for sim_telarray metaparameter registry
schema_version: 0.1.0
meta_schema: simpipe-schema
meta_schema_url: https://raw.githubusercontent.com/gammasim/simtools/main/src/simtools/schemas/sim_telarray_metaparameter.metaschema.yml
meta_schema_version: 0.1.0
name: sim_telarray_metaparameters
description: |-
  Registry of sim_telarray metadata keys emitted by simtools.
  Generated metadata are described explicitly here.
  Model-parameter-derived metadata are resolved automatically either by a simple
  name match against src/simtools/schemas/model_parameters or, for renamed keys,
  through described_metaparameters.
generated_metaparameters:
  array_config_name:
    scope: global
    mode: assign
    category: provenance
    description: Generated array configuration family name.
  array_config_variant:
    scope: global
    mode: assign
    category: provenance
    description: Generated array configuration variant.
    value_schema: {kind: scalar, data_type: string, allow_empty: true}
  array_config_version:
    scope: global
    mode: assign
    category: provenance
    description: Generated array configuration version.
  camera_config_name:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated camera configuration family name.
  camera_config_variant:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated camera configuration variant.
  camera_config_version:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated camera configuration version.
  config_release:
    scope: global
    mode: assign
    category: provenance
    description: Generated configuration release string.
  config_version:
    scope: global
    mode: assign
    category: provenance
    description: Generated configuration version.
  nsb_integrated_flux:
    scope: global
    mode: set
    category: site_configuration
    description: Integrated night-sky background flux.
    value_schema: {kind: scalar, data_type: number}
  optics_config_name:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated optics configuration family name.
  optics_config_variant:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated optics configuration variant.
  optics_config_version:
    scope: telescope
    mode: assign
    category: provenance
    description: Generated optics configuration version.
  random_seed:
    scope: global
    mode: add
    category: run_parameter
    description: Random seed included in sim_telarray metadata.
    value_schema: {kind: scalar, data_type: integer}
  simtools_avx_flag:
    scope: global
    mode: set
    category: software
    description: simtools build AVX flag.
  simtools_build_date:
    scope: global
    mode: set
    category: software
    description: simtools build date.
  simtools_corsika_config_version:
    scope: global
    mode: set
    category: software
    description: simtools CORSIKA configuration version.
  simtools_corsika_exec:
    scope: global
    mode: set
    category: software
    description: CORSIKA executable identifier used by simtools.
  simtools_corsika_opt_patch_version:
    scope: global
    mode: set
    category: software
    description: simtools CORSIKA optical patch version.
  simtools_corsika_version:
    scope: global
    mode: set
    category: software
    description: CORSIKA version used by simtools.
    value_schema: {kind: scalar, data_type: integer}
  simtools_extra_defines:
    scope: global
    mode: set
    category: software
    description: Extra compiler defines recorded by simtools.
  simtools_hessio_version:
    scope: global
    mode: set
    category: software
    description: HESSIO version used by simtools.
  simtools_iact_atmo_version:
    scope: global
    mode: set
    category: software
    description: IACT/atmosphere package version used by simtools.
  simtools_model_production_version:
    scope: global
    mode: set
    category: software
    description: Simulation-model production version used by simtools.
  simtools_simtel_version:
    scope: global
    mode: set
    category: software
    description: sim_telarray version used by simtools.
  simtools_stdtools_version:
    scope: global
    mode: set
    category: software
    description: stdtools version used by simtools.
  simtools_version:
    scope: global
    mode: set
    category: software
    description: simtools version.
  site_config_name:
    scope: global
    mode: assign
    category: provenance
    description: Generated site configuration name.
  site_config_variant:
    scope: global
    mode: assign
    category: provenance
    description: Generated site configuration variant.
    value_schema: {kind: scalar, data_type: string, allow_empty: true}
  site_config_version:
    scope: global
    mode: assign
    category: provenance
    description: Generated site configuration version.
described_metaparameters:
  altitude:
    source_name: corsika_observation_level
  dsum_shaping_file:
    source_name: dsum_shaping
  muon_mono_thresh:
    source_name: muon_mono_threshold
  nightsky_background:
    source_name: nsb_pixel_rate
    value_schema:
      kind: sim_telarray_key_value_string
      regex: '^(all|\([0-9]+-[0-9]+\)):\s*-?[0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?$'
  latitude:
    source_name: reference_point_latitude
  longitude:
    source_name: reference_point_longitude
  mirror2_degraded_reflection:
    source_name: secondary_mirror_degraded_reflection
  primary_degraded_map:
    source_name: primary_mirror_degraded_map
  primary_diameter:
    source_name: primary_mirror_diameter
  primary_hole_diameter:
    source_name: primary_mirror_hole_diameter
  primary_segmentation:
    source_name: primary_mirror_segmentation
  random_mono_prob:
    source_name: random_mono_probability
  secondary_baffle:
    source_name: secondary_mirror_baffle
  secondary_degraded_map:
    source_name: secondary_mirror_degraded_map
  secondary_diameter:
    source_name: secondary_mirror_diameter
  secondary_hole_diameter:
    source_name: secondary_mirror_hole_diameter
  secondary_segmentation:
    source_name: secondary_mirror_segmentation
  secondary_shadow_diameter:
    source_name: secondary_mirror_shadow_diameter
  secondary_shadow_offset:
    source_name: secondary_mirror_shadow_offset
