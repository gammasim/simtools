---
$schema: http://json-schema.org/draft-06/schema#
$ref: '#/definitions/SimtoolsApplicationWorkflowConfiguration'
title: SimPipe application workflow configuration metaschema
description: YAML representation of application workflow configuration metaschema
schema_version: 0.4.0
schema_name: application_workflow.metaschema
type: object
additionalProperties: false

definitions:
  SimtoolsApplicationWorkflowConfiguration:
    type: object
    additionalProperties: false
    properties:
      applications:
        "$ref": "#/definitions/applications"
      collection:
        "$ref": "#/definitions/collection"
      schema_version:
        $ref: 'common_definitions.schema.yml#/$defs/schema_version_field'
      schema_url:
        $ref: 'common_definitions.schema.yml#/$defs/schema_url_field'
      schema_name:
        $ref: 'common_definitions.schema.yml#/$defs/schema_name_field'
      activity_id:
        type: string
        description: "Workflow activity UUID. If omitted, generated automatically."
      runtime_environment:
        $ref: 'common_definitions.schema.yml#/$defs/run_time_environment'
    required:
      - applications
      - schema_version
      - schema_name
    title: ""
  collection:
    oneOf:
      - "$ref": "#/definitions/collection_entry"
      - type: array
        items:
          "$ref": "#/definitions/collection_entry"
  collection_entry:
    type: object
    additionalProperties: false
    properties:
      output_path:
        type: string
        description: "Path to the collection output directory."
      files:
        type: array
        items:
          type: string
        description: "List of files to copy from source directories to collection output_path."
      source_directory:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: |
          Application configuration key or list of keys containing source directories searched for collection files.
          Defaults to output_path.
    required:
      - output_path
      - files
  applications:
    additionalProperties: false
    type: array
    items:
      type: object
      properties:
        application:
          type: string
          description: "Name of simtools application"
        test_name:
          type: string
          description: "Test name. Should be unique for this application."
        skip_for_production_db:
          type: boolean
          description: "Skip test if production DB is used."
        skip_integration_test:
          type: string
          description: "Skip test with the given skip message."
        model_version_use_current:
          type: boolean
          description: |
            "Skip test if model version is changed via command line.
            Important e.g., for cases where DB model is incomplete for some
            model versions."
        docs:
          type: object
          additionalProperties: false
          description: "Optional documentation metadata for rendering tested examples."
          properties:
            title:
              type: string
              description: "Short title shown in generated documentation examples."
            summary:
              type: string
              description: "Short summary shown in generated documentation examples."
        configuration:
          "$ref": "#/definitions/configuration"
        integration_tests:
          type: array
          items:
            "$ref": "#/definitions/integration_test"
        test_requirement:
          type: string
          description: "Requirement ID of the test."
        test_use_case:
          type: string
          description: "Use case ID of the test."
        xfail_network_error:
          type: boolean
          description: "Mark test as xfail if application exits with a network error."
      required:
        - application
        - configuration
    title: Applications
  configuration:
    description: "Command line configuration of simtools application."
    type: object
    additionalProperties: true
    title: Configuration
  integration_test:
    description: "List of integration tests."
    type: object
    additionalProperties: false
    properties:
      output_file:
        description: |
          "Path of output file tested to be generated by integration test."
        type: string
      test_output_files:
        type: array
        items:
          type: object
          properties:
            path_descriptor:
              type: string
            file:
              type: string
            expected_output:
              description: |
                "Expected output of integration test."
              type: object
          required: ["path_descriptor", "file"]
      file_type:
        description: |
          "Expected file type of output file generated by integration test."
        type: string
      reference_output_file:
        description: |
          "Reference file used for comparison."
        type: string
      model_parameter_validation:
        description: |
          "Validation of model parameters against reference values."
        type: object
        additionalProperties: false
        properties:
          parameter_file:
            description: |
              "Path to the JSON file containing model parameters."
            type: string
          reference_parameter_name:
            description: |
              "Name of the parameter to validate against the reference."
            type: string
          tolerance:
            description: |
              "Allowed tolerance for floating point comparison."
            type: number
          scaling:
            description: |
              "Scaling factor to apply to the model parameter value before comparison."
            type: number
      test_simtel_cfg_files:
        description: |
          "Reference file used for comparison of sim_telarray configuration files."
        type: object
        additionalProperties: false
        patternProperties:
          "^[0-9]+\\.[0-9]+(?:\\.[0-9]+)?$":  # Version pattern (e.g., "5.0", "6.0", "5.0.0", "6.0.0")
            type: string
            description: Path to the configuration file for the given version.
        minProperties: 1
      test_output_file:
        description: |
          "Output file generated by the integration test for comparison with the reference file."
        type: string
      tolerance:
        description: "Allowed tolerance for floating point comparison."
        type: number
      test_columns:
        description: "List of columns to be compared, each with optional cut conditions."
        type: array
        items:
          type: object
          properties:
            test_column_name:
              description: "Name of the column to compare."
              type: string
            cut_column_name:
              description: "Name of the column for applying the cut."
              type: string
            cut_condition:
              description: "Condition to apply to the cut column."
              type: string
      output_validation:
        description: "Declarative semantic validation rules for generated outputs."
        type: array
        minItems: 1
        items:
          oneOf:
            - "$ref": "#/definitions/output_validation_file_rule"
            - "$ref": "#/definitions/output_validation_relationship_rule"
    title: ApplicationWorkflow
  output_validation_file_rule:
    description: "Semantic validation rules for one output file or data product."
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      kind:
        type: string
        enum: [file, table, mapping, group, event_stream]
      path_descriptor:
        type: string
        minLength: 1
      output_sub_path:
        type: string
      file:
        type: string
        minLength: 1
      format:
        type: string
        enum: [ecsv, fits, json, yaml, yml, hdf5, simtel]
      object_path:
        type: string
      event_type:
        type: string
      non_empty:
        type: boolean
      count:
        "$ref": "#/definitions/output_validation_count"
      required_keys:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      forbidden_keys:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      required_columns:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      forbidden_columns:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      columns:
        type: object
        additionalProperties:
          "$ref": "#/definitions/output_validation_field_rule"
      metadata:
        "$ref": "#/definitions/output_validation_metadata_rule"
      consistency:
        type: array
        items:
          "$ref": "#/definitions/output_validation_consistency_rule"
      data_product_schema:
        type: string
        minLength: 1
    required: [kind, path_descriptor, file]
  output_validation_relationship_rule:
    description: "Semantic relationship checks between multiple output files."
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      kind:
        type: string
        enum: [relationship]
      outputs:
        type: array
        minItems: 2
        items:
          "$ref": "#/definitions/output_validation_output_reference"
      checks:
        type: array
        minItems: 1
        items:
          "$ref": "#/definitions/output_validation_relationship_check"
    required: [kind, outputs, checks]
  output_validation_output_reference:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
        minLength: 1
      path_descriptor:
        type: string
        minLength: 1
      output_sub_path:
        type: string
      file:
        type: string
        minLength: 1
      kind:
        type: string
        enum: [file, table, mapping, group, event_stream]
      format:
        type: string
        enum: [ecsv, fits, json, yaml, yml, hdf5, simtel]
      object_path:
        type: string
      event_type:
        type: string
    required: [name, path_descriptor, file, kind]
  output_validation_count:
    type: object
    additionalProperties: false
    properties:
      exact:
        type: integer
        minimum: 0
      minimum:
        type: integer
        minimum: 0
      maximum:
        type: integer
        minimum: 0
    minProperties: 1
  output_validation_range:
    type: object
    additionalProperties: false
    properties:
      minimum:
        type: number
      maximum:
        type: number
      unit:
        type: string
        minLength: 1
      inclusive:
        type: boolean
    minProperties: 1
    anyOf:
      - required: [minimum]
      - required: [maximum]
  output_validation_field_rule:
    type: object
    additionalProperties: false
    properties:
      type:
        type: string
        enum:
          - bool
          - string
          - int8
          - int16
          - int32
          - int64
          - uint8
          - uint16
          - uint32
          - uint64
          - float32
          - float64
          - number
      unit:
        type: string
      finite:
        type: boolean
      unique:
        type: boolean
      allowed_values:
        type: array
        minItems: 1
        items: {}
      range:
        "$ref": "#/definitions/output_validation_range"
  output_validation_metadata_rule:
    type: object
    additionalProperties: false
    properties:
      required_keys:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
      forbidden_keys:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
    minProperties: 1
  output_validation_operand:
    oneOf:
      - type: [string, number, boolean, 'null']
      - type: object
        additionalProperties: false
        properties:
          source:
            type: string
            enum: [metadata, content]
          path:
            type: string
            minLength: 1
          metric:
            type: string
            enum: [row_count, event_count, member_count, key_count]
          aggregate:
            "$ref": "#/definitions/output_validation_aggregate"
        required: [source]
        oneOf:
          - required: [path]
          - required: [metric]
          - required: [aggregate]
  output_validation_aggregate:
    type: object
    additionalProperties: false
    properties:
      function:
        type: string
        enum: [sum, minimum, maximum, count, unique_count]
      column:
        type: string
        minLength: 1
    required: [function, column]
  output_validation_consistency_rule:
    type: object
    additionalProperties: false
    properties:
      left:
        "$ref": "#/definitions/output_validation_operand"
      operator:
        type: string
        enum: [equals, greater_than, greater_equal, less_than, less_equal, in]
      right:
        "$ref": "#/definitions/output_validation_operand"
    required: [left, operator, right]
  output_validation_relationship_operand:
    oneOf:
      - type: [string, number, boolean, 'null']
      - type: object
        additionalProperties: false
        properties:
          output:
            type: string
            minLength: 1
          path:
            type: string
            minLength: 1
          metric:
            type: string
            enum: [row_count, event_count, member_count, key_count]
          aggregate:
            "$ref": "#/definitions/output_validation_aggregate"
        required: [output]
        oneOf:
          - required: [path]
          - required: [metric]
          - required: [aggregate]
  output_validation_relationship_check:
    type: object
    additionalProperties: false
    properties:
      left:
        "$ref": "#/definitions/output_validation_relationship_operand"
      operator:
        type: string
        enum: [equals, greater_than, greater_equal, less_than, less_equal, in]
      right:
        "$ref": "#/definitions/output_validation_relationship_operand"
    required: [left, operator, right]
