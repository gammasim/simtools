%YAML 1.2
---
title: Schema for production_generate_grid density output
schema_version: 0.1.0
meta_schema: simpipe-schema
meta_schema_url: https://raw.githubusercontent.com/gammasim/simtools/main/src/simtools/schemas/model_parameter_and_data_schema.metaschema.yml
meta_schema_version: 0.1.0
name: production_generate_grid_density
description: |-
  Executable CORSIKA/sim_telarray job grid produced by production_generate_grid
  for direction-grid-density driven sampling.
data:
  - type: data_table
    table_columns:
      - name: primary
        description: Primary particle type.
        required: true
        unit: dimensionless
        type: string
      - name: azimuth_angle_value
        description: Azimuth pointing angle value.
        required: true
        unit: deg
        type: float64
      - name: azimuth_angle_unit
        description: Unit of azimuth pointing angle.
        required: true
        unit: dimensionless
        type: string
      - name: zenith_angle_value
        description: Zenith pointing angle value.
        required: true
        unit: deg
        type: float64
      - name: zenith_angle_unit
        description: Unit of zenith pointing angle.
        required: true
        unit: dimensionless
        type: string
      - name: energy_min_value
        description: Minimum primary energy value.
        required: true
        unit: GeV
        type: float64
      - name: energy_min_unit
        description: Unit of minimum primary energy.
        required: true
        unit: dimensionless
        type: string
      - name: energy_max_value
        description: Maximum primary energy value.
        required: true
        unit: TeV
        type: float64
      - name: energy_max_unit
        description: Unit of maximum primary energy.
        required: true
        unit: dimensionless
        type: string
      - name: core_scatter_number
        description: Number of core scatter samples.
        required: true
        unit: dimensionless
        type: int64
      - name: core_scatter_max_value
        description: Maximum core scatter radius value.
        required: true
        unit: m
        type: float64
      - name: core_scatter_max_unit
        description: Unit of maximum core scatter radius.
        required: true
        unit: dimensionless
        type: string
      - name: view_cone_min_value
        description: Minimum view cone radius value.
        required: true
        unit: deg
        type: float64
      - name: view_cone_min_unit
        description: Unit of minimum view cone radius.
        required: true
        unit: dimensionless
        type: string
      - name: view_cone_max_value
        description: Maximum view cone radius value.
        required: true
        unit: deg
        type: float64
      - name: view_cone_max_unit
        description: Unit of maximum view cone radius.
        required: true
        unit: dimensionless
        type: string
      - name: showers_per_run
        description: Number of showers simulated per run.
        required: true
        unit: dimensionless
        type: int64
      - name: model_version
        description: Simulation model version.
        required: true
        unit: dimensionless
        type: string
      - name: array_layout_name
        description: Array layout identifier.
        required: true
        unit: dimensionless
        type: string
      - name: corsika_le_interaction
        description: CORSIKA low-energy interaction model.
        required: true
        unit: dimensionless
        type: string
      - name: corsika_he_interaction
        description: CORSIKA high-energy interaction model.
        required: true
        unit: dimensionless
        type: string
      - name: run_number
        description: Run index within each grid point.
        required: true
        unit: dimensionless
        type: int64
      - name: ra
        description: Right ascension coordinate value for ra_dec coordinate systems.
        required: false
        unit: deg
        type: float64
      - name: dec
        description: Declination coordinate value for ra_dec coordinate systems.
        required: false
        unit: deg
        type: float64
